<!DOCTYPE html>
<html lang="en">
<head>
  <!-- All techy stuff goes here, inside HEAD -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Overall title of your page -->
  <title>Goober Quest</title>

 
  <link rel="stylesheet" href="index.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


  <script src="JS/index.js" defer></script>
    <script src="JS/player.js" defer></script>
     <script src="JS/functions.js" defer></script>
     <script src="JS/event.js" defer></script>
   

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Rubik+Iso&display=swap" rel="stylesheet">

</head>

<body>
    <div id = 'wrapper'>
        <canvas id="canvas" width="1450" height="780"></canvas>
    </div>
    <div id = "menu">
            <img src = "images/Options-Menu.png">
                <div class="musiccontainer">
                Music: <input type="range" min="1" max="100" value="75" class="slider" id="musicslider">
                </div>

                <div class="sfxcontainer">
                Sound: <input type="range" min="1" max="100" value="75" class="slider" id="sfxslider">
                </div>
        </div>
    <div class = "box">
        <div class = "buttons">
            <button id = "start">
                <img src = "images/goob-button.png">
            </button>
            <button id = "option">
                <img src = "images/options-button.png">
            </button>
            <button id = "exit"> 
                <img src = "images/quit-button.png">
            </button>
        </div>
    </div>
    <button id = "back">back</button>
    <button id = "backGame">backGame</button>
    <audio id="hover" src="audio/hover.mp3"></audio>



</body>
